# ===== PROD PROFILE (Railway) =====

# Postgres — Railway injects these variables automatically
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — validate schema only, never auto-alter in prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Logging — suppress noise, keep app-level INFO and above
logging.level.root=WARN
logging.level.com.mkrasikoff.epigraph=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
