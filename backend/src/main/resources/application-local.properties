# ===== LOCAL PROFILE =====

# Postgres
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/epigraph}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — allow Hibernate to auto-update schema in local dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Logging — verbose for local development
logging.level.root=INFO
logging.level.com.mkrasikoff.epigraph=DEBUG
logging.level.org.springframework.web=DEBUG
