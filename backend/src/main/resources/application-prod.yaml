# ===== PROD PROFILE (Railway) =====

spring:
  # Postgres: Railway injects these variables automatically
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  # Liquibase
  liquibase:
    change-log: classpath:db/db-changelog.yaml

  # JPA: validate schema only, never auto-alter in prod
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  # Google OAuth2
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile

# http -> https requests
server:
  forward-headers-strategy: framework

# Logging: suppress noise, keep app-level INFO and above
logging:
  level:
    root: WARN
    com.mkrasikoff.epigraph: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
