# Application name
spring:
  application:
    name: epigraph
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true

# Railway port: Railway injects PORT automatically, fallback 8080 for local
server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 часа
  vapid:
    public-key: ${VAPID_PUBLIC_KEY:}
    private-key: ${VAPID_PRIVATE_KEY:}
    subject: ${VAPID_SUBJECT:mailto:epigraph.support@icloud.com}

logging:
  pattern:
    console: "%d{HH:mm:ss} %5level [req:%X{requestId}] [user:%X{userId}] %logger{20} - %msg%n"
  level:
    com.mkrasikoff.epigraph.service.AuthService: INFO
    com.mkrasikoff.epigraph.controller.AuthController: INFO
    org.springframework.web.servlet.mvc.method.annotation: WARN
    org.springframework.security: WARN
