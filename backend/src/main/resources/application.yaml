# Application name
spring:
  application:
    name: epigraph
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true

# Railway port: Railway injects PORT automatically, fallback 8080 for local
server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 часа
